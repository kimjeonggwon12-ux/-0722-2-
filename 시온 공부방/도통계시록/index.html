    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                        danger: '#ef4444',
                        background: '#f4f6fc',
                    },
                    fontFamily: {
                        sans: ['Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', 'sans-serif'],
                    },
                    animation: {
                        'bounce-slight': 'bounceSlight 0.5s ease-in-out',
                        'shake': 'shake 0.4s ease-in-out',
                        'stamp-pop': 'stampPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)',
                    },
                    keyframes: {
                        bounceSlight: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-5px)' },
                        },
                        shake: {
                            '0%, 100%': { transform: 'translateX(0)' },
                            '25%': { transform: 'translateX(-4px)' },
                            '75%': { transform: 'translateX(4px)' },
                        },
                        stampPop: {
                            '0%': { transform: 'scale(0) rotate(20deg)', opacity: '0' },
                            '100%': { transform: 'scale(1) rotate(-15deg)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');

        @font-face {
            font-family: 'Jalnan';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_four@1.2/JalnanOTF00.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f4f6fc;
            color: #0f172a;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }

        .fade-enter {
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .option-btn {
            min-height: 56px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            word-break: keep-all;
            line-height: 1.3;
        }
        
        .option-btn:active { transform: scale(0.97); }

        .option-correct {
            background-color: #10b981 !important;
            color: white !important;
            border-color: #059669 !important;
            box-shadow: 0 4px 14px 0 rgba(16, 185, 129, 0.39);
        }

        .option-incorrect {
            background-color: #ef4444 !important;
            color: white !important;
            border-color: #dc2626 !important;
            box-shadow: 0 4px 14px 0 rgba(239, 68, 68, 0.39);
        }

        .option-disabled {
            opacity: 0.6;
            pointer-events: none;
        }

        /* ===== 메인 타이틀 디자인 ===== */
        .title-ko-wrap {
            position: relative;
            display: inline-block;
        }

        /* 道通 — 붓글씨 낙관(도장) 느낌, 도통 왼쪽 귀퉁이에 겹침 */
        .title-hanja {
            position: absolute;
            top: -10px;
            left: -30px;
            font-family: 'Ma Shan Zheng', 'Noto Serif KR', serif;
            font-size: 33px;
            line-height: 1;
            color: #d6492f;
            transform: rotate(-14deg);
            z-index: 3;
            text-shadow: 0 2px 8px rgba(214, 73, 47, 0.28);
            pointer-events: none;
        }

        .title-dotong {
            font-family: 'Jalnan', 'Jua', sans-serif;
            font-size: 72px;
            line-height: 1.05;
            letter-spacing: -0.03em;
            background: linear-gradient(170deg, #b0bafc 0%, #7f8af5 45%, #575fe8 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            filter: drop-shadow(0 8px 18px rgba(91, 99, 234, 0.35));
        }

        .title-gyesirok {
            font-family: 'Jalnan', 'Jua', sans-serif;
            font-size: 82px;
            line-height: 1.0;
            letter-spacing: -0.04em;
            background: linear-gradient(175deg, #37337f 0%, #1e1b4b 55%, #14113a 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent;
            filter: drop-shadow(0 10px 20px rgba(30, 27, 75, 0.25));
        }

        .title-sub {
            font-family: 'Pretendard', sans-serif;
            font-weight: 700;
            font-size: 14px;
            color: #64748b;
            letter-spacing: 0.12em;
        }

  "6": "저희가 권세를 가지고 하늘을 닫아 그 예언을 하는 날 동안 비 오지 못하게 하고 또 권세를 가지고 물을 변하여 피 되게 하고 아무 때든지 원하는 대로 여러가지 재앙으로 땅을 치리로다",
  "7": "저희가 그 증거를 마칠 때에 무저갱으로부터 올라오는 짐승이 저희로 더불어 전쟁을 일으켜 저희를 이기고 저희를 죽일터인즉",
  "8": "저희 시체가 큰 성길에 있으리니 그 성은 영적으로 하면 소돔이라고도 하고 애굽이라고도 하니 곧 저희 주께서 십자가에 못 박히신 곳이니라",
  "9": "백성들과 족속과 방언과 나라 중에서 사람들이 그 시체를 사흘 반 동안을 목도하며 무덤에 장사하지 못하게 하리로다",
  "10": "이 두 선지자가 땅에 거하는 자들을 괴롭게 한고로 땅에 거하는 자들이 저희의 죽음을 즐거워하고 기뻐하여 서로 예물을 보내리라 하더라",
  "11": "삼일 반 후에 하나님께로부터 생기가 저희 속에 들어가매 저희가 발로 일어서니 구경하는 자들이 크게 두려워하더라",
  "12": "하늘로부터 큰 음성이 있어 이리로 올라오라 함을 저희가 듣고 구름을 타고 하늘로 올라가니 저희 원수들도 구경하더라",
  "13": "그 시에 큰 지진이 나서 성 십분의 일이 무너지고 지진에 죽은 사람이 칠천이라 그 남은 자들이 두려워하여 영광을 하늘의 하나님께 돌리더라",
  "14": "둘째 화는 지나갔으나 보라 셋째 화가 속히 이르는도다",
  "15": "일곱째 천사가 나팔을 불매 하늘에 큰 음성들이 나서 가로되 세상 나라가 우리 주와 그 그리스도의 나라가 되어 그가 세세토록 왕노릇 하시리로다 하니",
  "16": "하나님 앞에 자기 보좌에 앉은 이십 사 장로들이 엎드려 얼굴을 대고 하나님께 경배하여",
  "17": "가로되 감사하옵나니 옛적에도 계셨고 시방도 계신 주 하나님 곧 전능하신이여 친히 큰 권능을 잡으시고 왕노릇 하시도다",
  "18": "이방들이 분노하매 주의 진노가 임하여 죽은 자를 심판하시며 종 선지자들과 성도들과 또 무론대소하고 주의 이름을 경외하는 자들에게 상 주시며 또 땅을 망하게 하는 자들을 멸망시키실 때로소이다 하더라",
  "19": "이에 하늘에 있는 하나님의 성전이 열리니 성전 안에 하나님의 언약궤가 보이며 또 번개와 음성들과 뇌성과 지진과 큰 우박이 있더라"
 },
 "ch12": {
  "1": "하늘에 큰 이적이 보이니 해를 입은 한 여자가 있는데 그 발 아래는 달이 있고 그 머리에는 열 두 별의 면류관을 썼더라",
  "2": "이 여자가 아이를 배어 해산하게 되매 아파서 애써 부르짖더라",
  "3": "하늘에 또 다른 이적이 보이니 보라 한 큰 붉은 용이 있어 머리가 일곱이요 뿔이 열이라 그 여러 머리에 일곱 면류관이 있는데",
  "4": "그 꼬리가 하늘 별 삼분의 일을 끌어다가 땅에 던지더라 용이 해산하려는 여자 앞에서 그가 해산하면 그 아이를 삼키고자 하더니",
  "5": "여자가 아들을 낳으니 이는 장차 철장으로 만국을 다스릴 남자라 그 아이를 하나님 앞과 그 보좌 앞으로 올려가더라",
  "6": "그 여자가 광야로 도망하매 거기서 일천 이백 육십일 동안 저를 양육하기 위하여 하나님의 예비하신 곳이 있더라",
  "7": "하늘에 전쟁이 있으니 미가엘과 그의 사자들이 용으로 더불어 싸울쌔 용과 그의 사자들도 싸우나",
  "8": "이기지 못하여 다시 하늘에서 저희의 있을 곳을 얻지 못한지라",
  "9": "큰 용이 내어 쫓기니 옛 뱀 곧 마귀라고도 하고 사단이라고도 하는 온 천하를 꾀는 자라 땅으로 내어 쫓기니 그의 사자들도 저와 함께 내어 쫓기니라",
  "10": "내가 또 들으니 하늘에 큰 음성이 있어 가로되 이제 우리 하나님의 구원과 능력과 나라와 또 그의 그리스도의 권세가 이루었으니 우리 형제들을 참소하던 자 곧 우리 하나님 앞에서 밤낮 참소하던 자가 쫓겨 났고",
  "11": "또 여러 형제가 어린 양의 피와 자기의 증거하는 말을 인하여 저를 이기었으니 그들은 죽기까지 자기 생명을 아끼지 아니하였도다",
  "12": "그러므로 하늘과 그 가운데 거하는 자들은 즐거워하라 그러나 땅과 바다는 화 있을찐저 이는 마귀가 자기의 때가 얼마 못된 줄을 알므로 크게 분내어 너희에게 내려 갔음이라 하더라",
  "13": "용이 자기가 땅으로 내어쫓긴 것을 보고 남자를 낳은 여자를 핍박하는지라",
  "14": "그 여자가 큰 독수리의 두 날개를 받아 광야 자기 곳으로 날아가 거기서 그 뱀의 낯을 피하여 한 때와 두 때와 반 때를 양육 받으매",
  "15": "여자의 뒤에서 뱀이 그 입으로 물을 강 같이 토하여 여자를 물에 떠내려 가게 하려 하되",
  "16": "땅이 여자를 도와 그 입을 벌려 용의 입에서 토한 강물을 삼키니",
  "17": "용이 여자에게 분노하여 돌아가서 그 여자의 남은 자손 곧 하나님의 계명을 지키며 예수의 증거를 가진 자들로 더불어 싸우려고 바다 모래 위에 섰더라"
 },
 "ch13": {
  "1": "내가 보니 바다에서 한 짐승이 나오는데 뿔이 열이요 머리가 일곱이라 그 뿔에는 열 면류관이 있고 그 머리들에는 참람된 이름들이 있더라",
  "2": "내가 본 짐승은 표범과 비슷하고 그 발은 곰의 발 같고 그 입은 사자의 입 같은데 용이 자기의 능력과 보좌와 큰 권세를 그에게 주었더라",
  "3": "그의 머리 하나가 상하여 죽게 된 것 같더니 그 죽게 되었던 상처가 나으매 온 땅이 이상히 여겨 짐승을 따르고",
  "4": "용이 짐승에게 권세를 주므로 용에게 경배하며 짐승에게 경배하여 가로되 누가 이 짐승과 같으뇨 누가 능히 이로 더불어 싸우리요 하더라",
  "5": "또 짐승이 큰 말과 참람된 말 하는 입을 받고 또 마흔두 달 일할 권세를 받으니라",
  "6": "짐승이 입을 벌려 하나님을 향하여 훼방하되 그의 이름과 그의 장막 곧 하늘에 거하는 자들을 훼방하더라",
  "7": "또 권세를 받아 성도들과 싸워 이기게 되고 각 족속과 백성과 방언과 나라를 다스리는 권세를 받으니",
  "8": "죽임을 당한 어린 양의 생명책에 창세 이후로 녹명되지 못하고 이 땅에 사는 자들은 다 짐승에게 경배하리라",
  "9": "누구든지 귀가 있거든 들을찌어다",
  "10": "사로잡는 자는 사로잡힐 것이요 칼로 죽이는 자는 자기도 마땅히 칼에 죽으리니 성도들의 인내와 믿음이 여기 있느니라",
  "11": "내가 보매 또 다른 짐승이 땅에서 올라오니 새끼 양같이 두 뿔이 있고 용처럼 말하더라",
  "12": "저가 먼저 나온 짐승의 모든 권세를 그 앞에서 행하고 땅과 땅에 거하는 자들로 처음 짐승에게 경배하게 하니 곧 죽게 되었던 상처가 나은 자니라",
  "13": "큰 이적을 행하되 심지어 사람들 앞에서 불이 하늘로부터 땅에 내려오게 하고",
  "14": "짐승 앞에서 받은바 이적을 행함으로 땅에 거하는 자들을 미혹하며 땅에 거하는 자들에게 이르기를 칼에 상하였다가 살아난 짐승을 위하여 우상을 만들라 하더라",
  "15": "저가 권세를 받아 그 짐승의 우상에게 생기를 주어 그 짐승의 우상으로 말하게 하고 또 짐승의 우상에게 경배하지 아니하는 자는 몇이든지 다 죽이게 하더라",
  "16": "저가 모든 자 곧 작은 자나 큰 자나 부자나 빈궁한 자나 자유한 자나 종들로 그 오른손에나 이마에 표를 받게 하고",
  "17": "누구든지 이 표를 가진 자 외에는 매매를 못하게 하니 이 표는 곧 짐승의 이름이나 그 이름의 수라",
  "18": "지혜가 여기 있으니 총명 있는 자는 그 짐승의 수를 세어 보라 그 수는 사람의 수니 육백 육십 륙이니라"
 },
 "ch14": {
  "1": "또 내가 보니 보라 어린 양이 시온산에 섰고 그와 함께 십 사만 사천이 섰는데 그 이마에 어린 양의 이름과 그 아버지의 이름을 쓴 것이 있도다",
  "2": "내가 하늘에서 나는 소리를 들으니 많은 물소리도 같고 큰 뇌성도 같은데 내게 들리는 소리는 거문고 타는 자들의 그 거문고 타는 것 같더라",
  "3": "저희가 보좌와 네 생물과 장로들 앞에서 새 노래를 부르니 땅에서 구속함을 얻은 십 사만 사천인 밖에는 능히 이 노래를 배울 자가 없더라",
  "4": "이 사람들은 여자로 더불어 더럽히지 아니하고 정절이 있는 자라 어린 양이 어디로 인도하든지 따라가는 자며 사람 가운데서 구속을 받아 처음 익은 열매로 하나님과 어린 양에게 속한 자들이니",
  "5": "그 입에 거짓말이 없고 흠이 없는 자들이더라",
  "6": "또 보니 다른 천사가 공중에 날아가는데 땅에 거하는 자들 곧 여러 나라와 족속과 방언과 백성에게 전할 영원한 복음을 가졌더라",
  "7": "그가 큰 음성으로 가로되 하나님을 두려워하며 그에게 영광을 돌리라 이는 그의 심판하실 시간이 이르렀음이니 하늘과 땅과 바다와 물들의 근원을 만드신 이를 경배하라 하더라",
  "8": "또 다른 천사 곧 둘째가 그 뒤를 따라 말하되 무너졌도다 무너졌도다 큰 성 바벨론이여 모든 나라를 그 음행으로 인하여 진노의 포도주로 먹이던 자로다 하더라",
  "9": "또 다른 천사 곧 세째가 그 뒤를 따라 큰 음성으로 가로되 만일 누구든지 짐승과 그의 우상에게 경배하고 이마에나 손에 표를 받으면",
  "10": "그도 하나님의 진노의 포도주를 마시리니 그 진노의 잔에 섞인 것이 없이 부은 포도주라 거룩한 천사들 앞과 어린 양 앞에서 불과 유황으로 고난을 받으리니",
  "11": "그 고난의 연기가 세세토록 올라가리로다 짐승과 그의 우상에게 경배하고 그 이름의 표를 받는 자는 누구든지 밤낮 쉼을 얻지 못하리라 하더라",
  "12": "성도들의 인내가 여기 있나니 저희는 하나님의 계명과 예수 믿음을 지키는 자니라",
  "13": "또 내가 들으니 하늘에서 음성이 나서 가로되 기록하라 자금 이후로 주 안에서 죽는 자들은 복이 있도다 하시매 성령이 가라사대 그러하다 저희 수고를 그치고 쉬리니 이는 저희의 행한 일이 따름이라 하시더라",
  "14": "또 내가 보니 흰구름이 있고 구름 위에 사람의 아들과 같은 이가 앉았는데 그 머리에는 금 면류관이 있고 그 손에는 이한 낫을 가졌더라",
  "15": "또 다른 천사가 성전으로부터 나와 구름 위에 앉은이를 향하여 큰 음성으로 외쳐 가로되 네 낫을 휘둘러 거두라 거둘 때가 이르러 땅에 곡식이 다 익었음이로다 하니",
  "16": "구름 위에 앉으신 이가 낫을 땅에 휘두르매 곡식이 거두어지니라",
  "17": "또 다른 천사가 하늘에 있는 성전에서 나오는데 또한 이한 낫을 가졌더라",
  "18": "또 불을 다스리는 다른 천사가 제단으로부터 나와 이한 낫 가진 자를 향하여 큰 음성으로 불러 가로되 네 이한 낫을 휘둘러 땅의 포도송이를 거두라 그 포도가 익었느니라 하더라",
  "19": "천사가 낫을 땅에 휘둘러 땅의 포도를 거두어 하나님의 진노의 큰 포도주 틀에 던지매",
  "20": "성 밖에서 그 틀이 밟히니 틀에서 피가 나서 말굴레까지 닿았고 일천 육백 스다디온에 퍼졌더라"
 },
 "ch15": {
  "1": "또 하늘에 크고 이상한 다른 이적을 보매 일곱 천사가 일곱 재앙을 가졌으니 곧 마지막 재앙이라 하나님의 진노가 이것으로 마치리로다",
  "2": "또 내가 보니 불이 섞인 유리 바다 같은 것이 있고 짐승과 그의 우상과 그의 이름의 수를 이기고 벗어난 자들이 유리바다 가에 서서 하나님의 거문고를 가지고",
  "3": "하나님의 종 모세의 노래, 어린 양의 노래를 불러 가로되 주 하나님 곧 전능하신이시여 하시는 일이 크고 기이하시도다 만국의 왕이시여 주의 길이 의롭고 참되시도다",
  "4": "주여 누가 주의 이름을 두려워하지 아니하며 영화롭게 하지 아니하오리이까 오직 주만 거룩하시니이다 주의 의로우신 일이 나타났으매 만국이 와서 주께 경배하리이다 하더라",
  "5": "또 이 일 후에 내가 보니 하늘에 증거 장막의 성전이 열리며",
  "6": "일곱 재앙을 가진 일곱 천사가 성전으로부터 나와 맑고 빛난 세마포 옷을 입고 가슴에 금띠를 띠고",
  "7": "네 생물 중에 하나가 세세에 계신 하나님의 진노를 가득히 담은 금대접 일곱을 그 일곱 천사에게 주니",

 "ch17": {

 "ch19": {

        let state = {
            currentChapterKey: null,
            questions: [],
            history: [],
            currentIndex: 0,
            score: 0
        };

        let ROUND_SIZE = 0;

        const els = {
            screens: { home: document.getElementById('screen-home'), quiz: document.getElementById('screen-quiz'), result: document.getElementById('screen-result') },
            btns: { quit: document.getElementById('btn-quit'), mainPrev: document.getElementById('btn-main-prev'), mainNext: document.getElementById('btn-main-next'), restart: document.getElementById('btn-restart'), home: document.getElementById('btn-home') },
            quiz: { chapterTitle: document.getElementById('ui-chapter-title'), score: document.getElementById('ui-score'), totalQScore: document.getElementById('ui-total-q-score'), currentQ: document.getElementById('ui-current-q'), totalQ: document.getElementById('ui-total-q'), verseNum: document.getElementById('verse-num'), verseText: document.getElementById('verse-text'), questionText: document.getElementById('question-text'), optionsContainer: document.getElementById('options-container') },
            feedback: { panel: document.getElementById('feedback-panel'), iconBox: document.getElementById('fb-icon-container'), title: document.getElementById('fb-title'), subtitle: document.getElementById('fb-subtitle'), explanation: document.getElementById('fb-explanation') },
            result: { chapterTitle: document.getElementById('result-chapter-title'), finalScore: document.getElementById('final-score'), finalTotal: document.getElementById('final-total'), message: document.getElementById('result-message'), wrongContainer: document.getElementById('wrong-answers-container'), wrongList: document.getElementById('wrong-answers-list'), wrongCount: document.getElementById('wrong-count') }
        };

        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex > 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function init() {
            els.btns.quit.addEventListener('click', quitQuiz);
            els.btns.home.addEventListener('click', quitQuiz);
            els.btns.restart.addEventListener('click', () => startChapter(state.currentChapterKey));
            els.btns.mainPrev.addEventListener('click', prevQuestion);
            els.btns.mainNext.addEventListener('click', nextQuestion);

            // 시온 공부방 첫 화면에서 로그인 여부 확인 후 분기
            if (localStorage.getItem('sion_auth') === '1') {
                showScreen('home');
            } else {
                window.location.href = '../index.html';
            }
        }

        function logout() {
            localStorage.removeItem('sion_auth');
            window.location.href = '../index.html';
        }

        window.startChapter = function(chapterKey) {
            state.currentChapterKey = chapterKey;
            const titles = chapterTitles[chapterKey];

            state.questions = [...quizDataStore[chapterKey]]; 
            ROUND_SIZE = state.questions.length;
            
            state.currentIndex = 0;
            state.score = 0;
            state.history = new Array(ROUND_SIZE).fill(null);

            els.quiz.chapterTitle.textContent = titles.title;
            els.quiz.totalQ.textContent = ROUND_SIZE;
            els.quiz.totalQScore.textContent = ROUND_SIZE;
            els.quiz.score.textContent = state.score;
            
            showScreen('quiz');
            loadQuestion();
        }

        function quitQuiz() { showScreen('home'); }

        function showScreen(screenName) {
            Object.values(els.screens).forEach(el => {
                el.classList.add('hidden');
                el.classList.remove('flex');
            });
            els.screens[screenName].classList.remove('hidden');
            els.screens[screenName].classList.add('flex');
        }

        function updateNavButtons() {
            const isFirst = state.currentIndex === 0;
            const isLast = state.currentIndex === ROUND_SIZE - 1;
            const isAnswered = state.history[state.currentIndex] && state.history[state.currentIndex].answered;
            
            els.btns.mainPrev.disabled = isFirst;
            els.btns.mainPrev.className = isFirst 
                ? 'w-1/2 bg-slate-50 text-slate-300 font-bold py-3.5 rounded-xl pointer-events-none text-[15px] flex justify-center items-center gap-1'
                : 'w-1/2 bg-slate-100 text-slate-500 font-bold py-3.5 rounded-xl active:scale-95 transition-all text-[15px] flex justify-center items-center gap-1 hover:bg-slate-200';
            
            els.btns.mainNext.disabled = false;
            
            let nextText = isLast ? '결과 보기 &gt;' : '다음 문제 &gt;';
            
            if (!isAnswered) {
                els.btns.mainNext.innerHTML = nextText;
                els.btns.mainNext.className = 'w-1/2 bg-[#f0f4ff] text-[#4f46e5] font-bold py-3.5 rounded-xl active:scale-95 transition-all flex justify-center items-center gap-1.5 text-[15px] hover:bg-[#e0e7ff]';
            } else {
                els.btns.mainNext.innerHTML = nextText;
                els.btns.mainNext.className = 'w-1/2 bg-[#4f46e5] text-white font-bold py-3.5 rounded-xl shadow-md active:scale-95 transition-all flex justify-center items-center gap-1.5 text-[15px] hover:bg-indigo-700';
            }
        }

        function loadQuestion() {
            const currentItem = state.questions[state.currentIndex];
            els.quiz.currentQ.textContent = state.currentIndex + 1;
            
            if (!state.history[state.currentIndex]) {
                const options = [{ text: currentItem.a, isCorrect: true, ref: currentItem.ref }];
                const pool = state.questions.filter(item => item.q !== currentItem.q && item.a !== currentItem.a);
                const shuffledPool = shuffle(pool);
                options.push({ text: shuffledPool[0].a, isCorrect: false });
                options.push({ text: shuffledPool[1].a, isCorrect: false });

                state.history[state.currentIndex] = { item: currentItem, options: shuffle(options), answered: false, selectedIndex: -1, isCorrect: false };
            }
            
            const hist = state.history[state.currentIndex];
            let chapterNum = state.currentChapterKey.replace('ch', '');
            els.quiz.verseNum.textContent = `계 ${chapterNum}:${currentItem.v}`;
            let vText = verses[state.currentChapterKey][currentItem.v] || "";
            
            let hlSource = currentItem.hl || currentItem.q;
            const keywords = (Array.isArray(hlSource) ? hlSource : [hlSource])
                .map(k => k.replace(/\s*\(.*?\)\s*/g, '').trim());
            const keyword = keywords[0];

            if (currentItem.h && vText.includes(currentItem.h)) {
                const index = currentItem.h.indexOf(keyword);
                if (index !== -1) {
                    const highlightedH = currentItem.h.substring(0, index) +
                                       `<span class="font-bold text-[#4f46e5] bg-[#e0e7ff] px-1 rounded">${keyword}</span>` +
                                       currentItem.h.substring(index + keyword.length);
                    vText = vText.replace(currentItem.h, highlightedH);
                }
            } else {
                keywords.forEach(kw => {
                    if (vText.includes(kw) && kw.length > 0) {
                        const escapedKeyword = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                        const regex = new RegExp(`(${escapedKeyword})`, 'g');
                        vText = vText.replace(regex, `<span class="font-bold text-[#4f46e5] bg-[#e0e7ff] px-1 rounded">$1</span>`);
                    }
                });
            }
            els.quiz.verseText.innerHTML = vText;
            els.quiz.questionText.textContent = currentItem.q;

            els.quiz.optionsContainer.innerHTML = '';
            hist.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn w-full bg-white border-2 border-slate-200 text-slate-700 font-bold text-[14px] py-3 px-4 rounded-xl shadow-sm hover:border-indigo-300 active:bg-slate-50 text-left relative flex items-center gap-3';
                const numBubble = `<div class="shrink-0 w-7 h-7 rounded-full bg-slate-100 text-slate-500 flex items-center justify-center font-black text-xs">${index + 1}</div>`;
                const textSpan = `<span class="flex-grow">${opt.text.replace(/\n/g, '<br>')}</span>`;
                btn.innerHTML = `${numBubble} ${textSpan}`;
                
                if (hist.answered) {
                    btn.classList.add('option-disabled');
                    if (opt.isCorrect) {
                        btn.classList.remove('option-disabled', 'border-slate-200', 'bg-white', 'text-slate-700');
                        btn.classList.add('option-correct');
                        btn.querySelector('div').classList.add('bg-emerald-600', 'text-white');
                        btn.querySelector('div').classList.remove('bg-slate-100', 'text-slate-500');
                    } else if (index === hist.selectedIndex) {
                        btn.classList.remove('option-disabled', 'border-slate-200', 'bg-white', 'text-slate-700');
                        btn.classList.add('option-incorrect');
                        btn.querySelector('div').classList.add('bg-red-600', 'text-white');
                        btn.querySelector('div').classList.remove('bg-slate-100', 'text-slate-500');
                    }
                } else {
                    btn.onclick = () => handleAnswer(index, btn);
                }
                els.quiz.optionsContainer.appendChild(btn);
            });

            if (hist.answered) showFeedback(hist.isCorrect, currentItem, true);
            else hideFeedback();
            
            updateNavButtons();
        }

        function handleAnswer(selectedIndex, selectedBtn) {
            const hist = state.history[state.currentIndex];
            if (hist.answered) return;
            hist.answered = true; hist.selectedIndex = selectedIndex; hist.isCorrect = hist.options[selectedIndex].isCorrect;

            if (hist.isCorrect) {
                state.score++;
                els.quiz.score.textContent = state.score;
            }

            const allBtns = els.quiz.optionsContainer.children;
            for (let i = 0; i < allBtns.length; i++) {
                allBtns[i].classList.add('option-disabled');
                allBtns[i].onclick = null; 
                if (hist.options[i].isCorrect) {
                    allBtns[i].classList.remove('option-disabled', 'border-slate-200', 'bg-white', 'text-slate-700');
                    allBtns[i].classList.add('option-correct');
                    allBtns[i].querySelector('div').classList.add('bg-emerald-600', 'text-white');
                }
            }
            if (hist.isCorrect) {
                selectedBtn.classList.add('animate-bounce-slight');
            } else {
                selectedBtn.classList.remove('option-disabled', 'border-slate-200', 'bg-white', 'text-slate-700');
                selectedBtn.classList.add('option-incorrect', 'animate-shake');
                selectedBtn.querySelector('div').classList.add('bg-red-600', 'text-white');
            }
            
            showFeedback(hist.isCorrect, hist.item, false);
            updateNavButtons();
        }

        function hideFeedback() { els.feedback.panel.classList.add('translate-y-full'); setTimeout(() => { els.feedback.panel.classList.add('hidden'); }, 300); }

        function showFeedback(isCorrect, item, instant = false) {
            els.feedback.panel.classList.remove('hidden');
            if (instant) {
                els.feedback.panel.classList.remove('translate-y-full', 'transition-transform', 'duration-300');
                els.feedback.panel.classList.add('translate-y-0');
                setTimeout(() => els.feedback.panel.classList.add('transition-transform', 'duration-300'), 50);
            } else {
                setTimeout(() => { els.feedback.panel.classList.remove('translate-y-full'); els.feedback.panel.classList.add('translate-y-0'); }, 50);
            }

            if (isCorrect) {
                els.feedback.iconBox.className = 'shrink-0 w-12 h-12 rounded-full flex items-center justify-center bg-emerald-100 text-emerald-600';
                els.feedback.iconBox.innerHTML = '<svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>';
                els.feedback.title.textContent = '정답입니다! 도장 획득!';
                els.feedback.title.className = 'text-lg font-black text-emerald-600 mb-1';
            } else {
                els.feedback.iconBox.className = 'shrink-0 w-12 h-12 rounded-full flex items-center justify-center bg-red-100 text-rose-500';
                els.feedback.iconBox.innerHTML = '<svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>';
                els.feedback.title.textContent = '틀렸습니다! (오답 추가)';
                els.feedback.title.className = 'text-lg font-black text-rose-500 mb-1';
            }
            els.feedback.explanation.innerHTML = `<span class="text-[#4f46e5] font-extrabold">[${item.q}]</span>의 뜻은<br><span class="font-bold text-slate-800">${item.a.replace(/\n/g, '<br>')}</span> 입니다.`;
            els.feedback.subtitle.textContent = item.ref ? `참고 성구: ${item.ref}` : '';
        }

        function prevQuestion() { if (state.currentIndex > 0) { state.currentIndex--; loadQuestion(); } }
        function nextQuestion() {
            if (state.currentIndex < ROUND_SIZE - 1) { state.currentIndex++; loadQuestion(); }
            else { finishQuiz(); }
        }

        function finishQuiz() {
            showScreen('result');
            let correctCount = state.history.filter(h => h && h.answered && h.isCorrect).length;
            els.result.chapterTitle.textContent = `${chapterTitles[state.currentChapterKey].title} 결과`;
            els.result.finalScore.textContent = correctCount;
            els.result.finalTotal.textContent = ROUND_SIZE;

            const percentage = (correctCount / ROUND_SIZE) * 100;
            if (percentage === 100) els.result.message.innerHTML = "완벽합니다!<br><span class=\"text-emerald-500 text-base\">모든 인을 맞으셨습니다!</span>";
            else if (percentage >= 80) els.result.message.innerHTML = "대단해요!<br><span class=\"text-[#4f46e5] text-base\">조금만 더 복습하면 완벽해질 거예요.</span>";
            else if (percentage >= 50) els.result.message.innerHTML = "좋은 시도입니다!<br><span class=\"text-amber-500 text-base\">틀린 문제를 다시 한 번 확인해보세요.</span>";
            else els.result.message.innerHTML = "꾸준함이 답입니다!<br><span class=\"text-rose-500 text-base\">아래 오답 노트를 보며 다시 암기해보세요!</span>";

            let wrongItems = [];
            state.history.forEach((hist, i) => {
                if (!hist || !hist.answered) wrongItems.push({ item: state.questions[i], wrongChoice: "선택 안 함 (건너뜀)" });
                else if (!hist.isCorrect) wrongItems.push({ item: hist.item, wrongChoice: hist.options[hist.selectedIndex].text });
            });

            if (wrongItems.length > 0) {
                els.result.wrongContainer.classList.remove('hidden'); els.result.wrongContainer.classList.add('flex');
                els.result.wrongCount.textContent = wrongItems.length;
                els.result.wrongList.innerHTML = wrongItems.map((wrong) => `
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-rose-100 relative overflow-hidden">
                        <div class="absolute top-0 left-0 w-1 h-full bg-rose-400"></div>
                        <h4 class="text-[15px] font-black text-slate-800 mb-2 leading-snug break-keep"><span class="text-rose-500 mr-1">Q.</span>${wrong.item.q}</h4>
                        <div class="bg-rose-50/50 rounded-xl p-3 mb-2 border border-rose-100/50">
                            <span class="text-[11px] font-bold text-rose-500 block mb-1">내가 고른 답</span>
                            <p class="text-sm text-slate-600 font-medium ${wrong.wrongChoice !== '선택 안 함 (건너뜀)' ? 'line-through' : ''} break-keep">${wrong.wrongChoice.replace(/\n/g, '<br>')}</p>
                        </div>
                        <div class="bg-emerald-50/50 rounded-xl p-3 border border-emerald-100/50">
                            <span class="text-[11px] font-bold text-emerald-600 block mb-1">정답</span>
                            <p class="text-sm text-slate-800 font-bold break-keep">${wrong.item.a.replace(/\n/g, '<br>')}</p>
                            ${wrong.item.ref ? `<p class="text-[12px] font-bold text-slate-400 mt-1.5 pt-1.5 border-t border-emerald-100/50">참고: ${wrong.item.ref}</p>` : ''}
                        </div>
                    </div>
                `).join('');
            } else {
                els.result.wrongContainer.classList.add('hidden'); els.result.wrongContainer.classList.remove('flex');
                els.result.wrongList.innerHTML = '';
            }
        }

        window.onload = init;
    </script>
